# A workflow that builds and pushes the Docker container image artifacts for
# the application. The action occurs on new tags and when called from another
# workflow.
---
name: "Build and Push"

"on":
  push:
    tags:
      - "*"
  workflow_call:
  workflow_dispatch:

jobs:

  build:
    name: "Build and Push Application Container Images"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: cmservice
            image: ${{ github.repository_owner }}/cm-service
          - target: cmworker
            image: ${{ github.repository_owner }}/cm-worker
          - target: cmweb
            image: ${{ github.repository_owner }}/cm-web
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Login to DHI
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: dhi.io
          username: ${{ vars.DOCKERHUB_SQREREADONLY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SQREREADONLY_TOKEN }}

      - uses: lsst-sqre/build-and-push-to-ghcr@4c321a20846de9fe30f9ea80c1149a70387d8e7b  # v1.5.2
        with:
          dockerfile: docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          image: ${{ matrix.image }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: true
