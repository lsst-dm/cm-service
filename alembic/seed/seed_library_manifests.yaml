---
apiVersion: io.lsst.cmservice/v1
kind: site
metadata:
  name: slac_lsstcam
  namespace: dda54a0c-6878-5c95-ac4f-007f6808049e
  version: 0
  labels:
    site: slac
    instrument: lsstcam
spec:
  facility: "SLAC"
  include_files:
    - "${DRP_PIPE_DIR}/bps/caching/LSSTCam/usdf/DRP-caching.yaml"
  provisioned_platform: "s3df"
  provisioned_queue: "milano"
  provisioned_account_group: "rubin:developers"
---
apiVersion: io.lsst.cmservice/v1
kind: bps
metadata:
  name: bps_slac
  namespace: dda54a0c-6878-5c95-ac4f-007f6808049e
  version: 0
  labels:
    site: slac
spec:
  operator: lsstsvc1
