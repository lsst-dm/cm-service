[project]
name = "lsst-cmservice-models"
dynamic = ["version"]
description = "CM Service Models"
requires-python = ">=3.12,<3.14"
dependencies = [
    "asgi-correlation-id>=4.3.4",
    "jinja2==3.1.*",
    "networkx>=3.5",
    "pydantic==2.12.*",
    "pydantic-settings==2.12.*",
    "sqlmodel>=0.0.24",
]

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=6.0.0",
]

[project.scripts]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
ignore-vcs = true

[tool.hatch.build.targets.wheel]
ignore-vcs = true
packages = ["src/lsst"]

[tool.hatch.version]
path = "src/lsst/cmservice/models/__init__.py"

[tool.pytest.ini_options]
testpaths = ["models_tests"]
