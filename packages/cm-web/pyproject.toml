[project]
name = "lsst-cmservice-web"
dynamic = ["version"]
description = "CM Service Web App"
requires-python = ">=3.12,<3.14"
dependencies = [
    "deepdiff>=8.6.1",
    "networkx>=3.5",
    "nicegui>=3.11.0",
    "nice-dialog",
    "pydantic>=2.12",
    "pydantic-extra-types>=2.10.5",
    "pydantic-settings>=2.12",
    "structlog>=24.4.0",
    "lsst-cmservice-models",
]

[dependency-groups]
dev = [
    "json-schema-for-humans",
]

[project.scripts]
web = "lsst.cmservice.web.libexec:go"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
ignore-vcs = true

[tool.hatch.build.targets.wheel]
ignore-vcs = true
packages = ["src/lsst"]

[tool.hatch.version]
path = "src/lsst/cmservice/web/__init__.py"

[tool.uv.sources]
lsst-cmservice-models = { workspace = true }
nice-dialog = { git = "https://github.com/tcjennings/nice-dialogs", rev = "ac9bce6de5604837e80a921206cf71d5a2e10010" }
